<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 720" fill="none">
  <defs>
    <!-- Flesh gradient: bright juicy green, lighter at top -->
    <radialGradient id="flesh" cx="50%" cy="20%" r="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="20%" stop-color="#d9f99d"/>
      <stop offset="55%" stop-color="#bef264"/>
      <stop offset="85%" stop-color="#a3e635"/>
      <stop offset="100%" stop-color="#84cc16"/>
    </radialGradient>
    <!-- Rind gradient: outside dark green, inside lighter -->
    <linearGradient id="rind" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <!-- Per-segment highlight gradient (top white shine) -->
    <linearGradient id="segShine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="512" cy="650" rx="320" ry="14" fill="#0a0a0a" opacity="0.18"/>

  <!-- The lime, tilted ~10° -->
  <g transform="rotate(-8 512 380)">

    <!-- ───── OUTER RIND OUTLINE (dark border) ───── -->
    <path d="M 122 380 A 390 390 0 0 1 902 380 L 902 380 Z" fill="#15803d"/>

    <!-- ───── RIND BODY (gradient green) ───── -->
    <path d="M 142 380 A 370 370 0 0 1 882 380 L 882 380 Z" fill="url(#rind)"/>

    <!-- Bumpy rind texture (small darker dots on the rind exterior) -->
    <g fill="#15803d" opacity="0.45">
      <circle cx="170" cy="330" r="5"/><circle cx="200" cy="270" r="5"/>
      <circle cx="240" cy="220" r="5"/><circle cx="290" cy="170" r="5"/>
      <circle cx="350" cy="125" r="5"/><circle cx="420" cy="100" r="5"/>
      <circle cx="500" cy="90" r="5"/><circle cx="580" cy="100" r="5"/>
      <circle cx="650" cy="125" r="5"/><circle cx="710" cy="170" r="5"/>
      <circle cx="770" cy="220" r="5"/><circle cx="810" cy="270" r="5"/>
      <circle cx="850" cy="330" r="5"/>
      <circle cx="220" cy="295" r="3.5"/><circle cx="265" cy="245" r="3.5"/>
      <circle cx="320" cy="195" r="3.5"/><circle cx="385" cy="145" r="3.5"/>
      <circle cx="460" cy="115" r="3.5"/><circle cx="540" cy="115" r="3.5"/>
      <circle cx="615" cy="145" r="3.5"/><circle cx="680" cy="195" r="3.5"/>
      <circle cx="735" cy="245" r="3.5"/><circle cx="790" cy="295" r="3.5"/>
    </g>
    <!-- Highlight bumps -->
    <g fill="#86efac" opacity="0.55">
      <circle cx="240" cy="285" r="3"/><circle cx="310" cy="210" r="3"/>
      <circle cx="400" cy="135" r="3"/><circle cx="500" cy="115" r="3"/>
      <circle cx="600" cy="135" r="3"/><circle cx="690" cy="210" r="3"/>
      <circle cx="760" cy="285" r="3"/>
    </g>

    <!-- ───── PITH RING (cream layer) ───── -->
    <path d="M 200 380 A 312 312 0 0 1 824 380 L 824 380 Z" fill="#fefce8"/>

    <!-- ───── FLESH FILL ───── -->
    <path d="M 220 380 A 292 292 0 0 1 804 380 L 804 380 Z" fill="url(#flesh)"/>

    <!-- ───── SEGMENT OUTLINES (dark green, like the reference's outlined illustration) ───── -->
    <!-- Two rows: top row (segments 1-4) and bottom row (segments 5-8). Actually one fan from center bottom. -->
    <!-- 8 segments fanning from (512, 380), spanning 180° (from -90° to +90° from vertical-down... but here vertical-up) -->

    <!-- Horizontal pith stripe across the bottom (separating into top half visually, since this is a half-lime) -->
    <line x1="220" y1="380" x2="804" y2="380" stroke="#15803d" stroke-width="6" stroke-linecap="round"/>

    <!-- Segment dividers (white pith lines fanning from center) -->
    <g stroke="#15803d" stroke-width="6" stroke-linecap="round" fill="none">
      <!-- 7 dividers creating 8 segments across the half-circle -->
      <line x1="512" y1="380" x2="512" y2="92"/>
      <line x1="512" y1="380" x2="380" y2="115"/>
      <line x1="512" y1="380" x2="280" y2="190"/>
      <line x1="512" y1="380" x2="220" y2="312"/>
      <line x1="512" y1="380" x2="644" y2="115"/>
      <line x1="512" y1="380" x2="744" y2="190"/>
      <line x1="512" y1="380" x2="804" y2="312"/>
    </g>

    <!-- Inner pith lines (slightly thinner, white-cream over the dark green dividers) -->
    <g stroke="#fefce8" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="512" y1="378" x2="512" y2="100"/>
      <line x1="510" y1="378" x2="384" y2="122"/>
      <line x1="508" y1="378" x2="285" y2="195"/>
      <line x1="506" y1="378" x2="225" y2="315"/>
      <line x1="514" y1="378" x2="640" y2="122"/>
      <line x1="516" y1="378" x2="739" y2="195"/>
      <line x1="518" y1="378" x2="799" y2="315"/>
    </g>

    <!-- Per-segment highlights (a soft shine on the upper portion of each wedge) -->
    <g opacity="0.7">
      <!-- Highlights are small ovals on each segment -->
      <ellipse cx="512" cy="180" rx="22" ry="55" fill="url(#segShine)"/>
      <ellipse cx="430" cy="200" rx="20" ry="55" fill="url(#segShine)" transform="rotate(-15 430 200)"/>
      <ellipse cx="350" cy="240" rx="18" ry="55" fill="url(#segShine)" transform="rotate(-30 350 240)"/>
      <ellipse cx="290" cy="295" rx="16" ry="50" fill="url(#segShine)" transform="rotate(-50 290 295)"/>
      <ellipse cx="594" cy="200" rx="20" ry="55" fill="url(#segShine)" transform="rotate(15 594 200)"/>
      <ellipse cx="674" cy="240" rx="18" ry="55" fill="url(#segShine)" transform="rotate(30 674 240)"/>
      <ellipse cx="734" cy="295" rx="16" ry="50" fill="url(#segShine)" transform="rotate(50 734 295)"/>
    </g>

    <!-- Center seed-pith dimple at the bottom center -->
    <circle cx="512" cy="378" r="8" fill="#fefce8"/>
    <circle cx="512" cy="378" r="4" fill="#84cc16" opacity="0.7"/>
  </g>
</svg>
